<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Sistema de Pólizas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="img1.jpg" alt="Logo" style="height:100px;width:auto;border-radius:14px;object-fit:contain;">
      <h1>Gestión de Pólizas</h1>
      <p>Accede a tu cuenta para continuar</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>Usuario o correo electrónico</label>
        <input type="text" id="loginEmail" placeholder="admin  ó  tu@correo.com" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btnLogin">Ingresar →</button>
      <div class="login-error" id="loginError"></div>
    </div>
    <div style="text-align:center; margin-top:24px; padding-top:20px; border-top:1px solid var(--soft);">
      <p style="font-size:11px; color:var(--gray); letter-spacing:0.5px;">Sistema de Administración de Seguros · v1.0</p>
    </div>
  </div>
</div>

<script type="module">
  const btnLogin   = document.getElementById('btnLogin');
  const loginError = document.getElementById('loginError');

  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') btnLogin.click();
  });

  btnLogin.addEventListener('click', async () => {
    const emailVal = document.getElementById('loginEmail').value.trim();
    const passVal  = document.getElementById('loginPass').value;
    loginError.style.display = 'none';

    if (!emailVal || !passVal) {
      loginError.textContent = 'Por favor completa todos los campos.';
      loginError.style.display = 'block';
      return;
    }

    btnLogin.textContent = 'Verificando...';
    btnLogin.disabled = true;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailVal, password: passVal })
      });

      const result = await res.json();

      if (res.ok && result.success) {
        sessionStorage.setItem('localUser', JSON.stringify(result.user));
        window.location.href = 'index.html';
      } else {
        loginError.textContent = result.message || 'Usuario o contraseña incorrectos.';
        loginError.style.display = 'block';
        btnLogin.textContent = 'Ingresar →';
        btnLogin.disabled = false;
      }
    } catch(e) {
      loginError.textContent = 'Error de conexión con el servidor.';
      loginError.style.display = 'block';
      btnLogin.textContent = 'Ingresar →';
      btnLogin.disabled = false;
    }
  });
</script>
</body>
</html>
