<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — Sistema de Pólizas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="img1.jpg" alt="Logo" style="height:100px;width:auto;border-radius:14px;object-fit:contain;">
      <h1>Gestión de Pólizas</h1>
      <p>Accede a tu cuenta para continuar</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="tu@correo.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btnLogin">Ingresar →</button>
      <div class="login-error" id="loginError"></div>
    </div>
    <div style="text-align:center; margin-top:24px; padding-top:20px; border-top:1px solid var(--soft);">
      <p style="font-size:11px; color:var(--gray); letter-spacing:0.5px;">Sistema de Administración de Seguros · v1.0</p>
    </div>
  </div>
</div>

<script type="module">
  import { auth } from './firebase-config.js';
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── USUARIO LOCAL (sin Firebase) ──────────────────────────
  const LOCAL_USERS = [
    { usuario: 'admin', password: '123456', nombre: 'Administrador' }
  ];

  const btnLogin   = document.getElementById('btnLogin');
  const loginError = document.getElementById('loginError');

  document.getElementById('loginPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') btnLogin.click();
  });

  btnLogin.addEventListener('click', async () => {
    const emailVal = document.getElementById('loginEmail').value.trim();
    const passVal  = document.getElementById('loginPass').value;
    loginError.style.display = 'none';

    if (!emailVal || !passVal) {
      loginError.textContent = 'Por favor completa todos los campos.';
      loginError.style.display = 'block';
      return;
    }

    btnLogin.textContent = 'Verificando...';
    btnLogin.disabled = true;

    // 1️⃣ Verificar usuario local primero
    const localMatch = LOCAL_USERS.find(
      u => u.usuario === emailVal && u.password === passVal
    );

    if (localMatch) {
      sessionStorage.setItem('localUser', JSON.stringify({ nombre: localMatch.nombre, usuario: localMatch.usuario }));
      window.location.href = 'index.html';
      return;
    }

    // 2️⃣ Si no es local, intentar Firebase
    try {
      await signInWithEmailAndPassword(auth, emailVal, passVal);
      window.location.href = 'index.html';
    } catch(e) {
      const msgs = {
        'auth/invalid-email':      'Correo electrónico inválido.',
        'auth/user-not-found':     'Usuario no encontrado.',
        'auth/wrong-password':     'Contraseña incorrecta.',
        'auth/invalid-credential': 'Credenciales incorrectas.',
        'auth/too-many-requests':  'Demasiados intentos. Espera un momento.'
      };
      loginError.textContent = msgs[e.code] || 'Usuario o contraseña incorrectos.';
      loginError.style.display = 'block';
      btnLogin.textContent = 'Ingresar →';
      btnLogin.disabled = false;
    }
  });
</script>
</body>
</html>
